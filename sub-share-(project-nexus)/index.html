<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubShare | Project Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Animation Definitions for Tailwind Arbitrary Values */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 10s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      /* Biological Breathing Animation for Urgent Cards */
      @keyframes biological-breath {
        0%, 100% { 
          box-shadow: 0 0 0 0px transparent;
          border-color: rgba(255,255,255,0.1);
        }
        50% { 
          box-shadow: 0 0 20px -5px var(--pulse-color);
          border-color: var(--pulse-color);
        }
      }
      .animate-biological-breath {
        animation: biological-breath 3s ease-in-out infinite;
      }

      /* Chat Bubble Animations */
      @keyframes slide-up-fade {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up-fade {
        animation: slide-up-fade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes scale-in {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scale-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
    </style>
