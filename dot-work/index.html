<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOT | Intelligent OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
      
      :root {
        --primary-purple: #D946EF;
        --glow-purple: rgba(217, 70, 239, 0.5);
        --bg-dark: #050505;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: #ffffff;
        overflow: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0f0f; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary-purple); 
      }

      /* Animations */
      @keyframes pulse-purple {
        0% { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(217, 70, 239, 0); }
        100% { box-shadow: 0 0 0 0 rgba(217, 70, 239, 0); }
      }

      .animate-pulse-purple {
        animation: pulse-purple 2s infinite;
      }

      .glass-panel {
        background: rgba(20, 20, 25, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-panel-heavy {
        background: rgba(10, 10, 12, 0.9);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(217, 70, 239, 0.1);
      }

      .neon-text {
        text-shadow: 0 0 15px var(--glow-purple);
      }
      
      .gradient-avatar {
         background: linear-gradient(135deg, #6366f1, #d946ef, #ec4899);
      }
      
      /* Editor Content Styles */
      .prose-editor {
        outline: none;
      }
      .prose-editor ul {
        list-style-type: disc;
        padding-left: 1.5em;
      }
      .prose-editor ol {
        list-style-type: decimal;
        padding-left: 1.5em;
      }
      .prose-editor blockquote {
        border-left: 3px solid var(--primary-purple);
        padding-left: 1em;
        color: #a1a1aa;
      }
      .prose-editor .task-item {
        display: flex;
        align-items: center;
        gap: 0.5em;
      }
      .prose-editor .task-item.checked {
        text-decoration: line-through;
        opacity: 0.6;
      }
      .prose-editor input[type="checkbox"] {
         accent-color: var(--primary-purple);
         width: 1.2em;
         height: 1.2em;
      }

      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #D946EF;
        cursor: pointer;
        margin-top: -6px;
        box-shadow: 0 0 10px #D946EF;
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #333;
        border-radius: 2px;
      }
    </style>

{

}

</head>

</html>
